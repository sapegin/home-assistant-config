# Save current light levels into `input_number.*_light_level` variables in lumens (lx)

- alias: "Save the current light level in Living room"
  id: save_current_light_level_living_room
  mode: single
  trigger:
  - platform: time_pattern
    seconds: /5
  action:
  - service: homeassistant.update_entity
    data: {}
    target:
      entity_id: sensor.living_room_motion_sensor_illuminance
  - service: input_number.set_value
    target:
      entity_id: input_number.living_room_light_level
    data:
      value: "{{ states('sensor.living_room_motion_sensor_illuminance') | int }}"

