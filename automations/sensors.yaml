# Update `input_boolean.someone_home` flag value based on motion/presence sensors

- alias: Turn on presence
  id: turn_on_presence
  mode: single
  trigger:
    - platform: state
      entity_id:
        - binary_sensor.living_room_motion_sensor_motion
      from: 'off'
      to: 'on'
    - platform: state
      entity_id:
        - binary_sensor.kitchen_motion_sensor_motion
      from: 'off'
      to: 'on'
    - platform: state
      entity_id:
        - binary_sensor.bathroom_motion_sensor_motion
      from: 'off'
      to: 'on'
    - platform: state
      entity_id:
        # This is the Meross presence sensor in the office, it breaks after renaming,
        # so we have to use the default name
        - binary_sensor.smart_presence_sensor_occupancy
      from: 'off'
      to: 'on'
  condition: []
  action:
    - service: input_boolean.turn_on
      data: {}
      target:
        entity_id: input_boolean.someone_home

- alias: Turn off presence
  id: turn_off_presence
  mode: single
  trigger:
    - platform: state
      entity_id:
        - binary_sensor.living_room_motion_sensor_motion
      from: 'on'
      to: 'off'
      for:
        minutes: 61
    - platform: state
      entity_id:
        - binary_sensor.smart_presence_sensor_occupancy
      from: 'on'
      to: 'off'
      for:
        minutes: 61
    - platform: state
      entity_id:
        - binary_sensor.bathroom_motion_sensor_motion
      from: 'on'
      to: 'off'
      for:
        minutes: 61
  condition:
    condition: and
    conditions:
      - condition: state
        entity_id:
          - binary_sensor.living_room_motion_sensor_motion
        state: 'off'
        for:
          minutes: 60
      - condition: state
        entity_id:
          - binary_sensor.smart_presence_sensor_occupancy
        state: 'off'
        for:
          minutes: 60
      - condition: state
        entity_id:
          - binary_sensor.bathroom_motion_sensor_motion
        state: 'off'
        for:
          minutes: 60
  action:
    - service: input_boolean.turn_off
      data: {}
      target:
        entity_id: input_boolean.someone_home