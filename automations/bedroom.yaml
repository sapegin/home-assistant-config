- alias: "Turn on bedroom ambient lights when it's dark"
  id: turn_on_bedroom_ambient_light_when_dark
  trigger:
    - platform: numeric_state
      entity_id: input_number.kitchen_light_level
      below: 40
      for:
        minutes: 1
  condition:
    - condition: time
      after: "13:00:00"
      before: "22:00:00"
  action:
    service: "light.turn_on"
    data:
      entity_id: light.bedroom_ambient_lights
      brightness: 40
      kelvin: 2000
      transition: 60
