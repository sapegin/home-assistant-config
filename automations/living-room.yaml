- alias: "Turn on living room ambient lights when somebody is in the room"
  id: turn_on_living_room_ambient_light_when_somebody_moves
  trigger:
    - platform: state
      entity_id:
        - binary_sensor.living_room_motion_sensor_motion
      from: 'off'
      to: 'on'
  condition:
    condition: and
    conditions:
      - condition: time
        after: "06:00:00"
        before: "01:00:00"
      - condition: numeric_state
        entity_id: input_number.living_room_light_level
        below: 40 # lx
  action:
    - parallel:
      - service: light.turn_on
        data:
          entity_id: light.sparkly_snake
          brightness_pct: 30
          rgb_color: [255, 130, 0]
          transition: 30
      - service: light.turn_on
        data:
          entity_id: light.ember
          brightness_pct: 15
          transition: 30

- alias: "Turn on living room night lights when somebody is in the room"
  id: turn_on_living_room_night_light_when_somebody_moves
  trigger:
    - platform: state
      entity_id:
        - binary_sensor.living_room_motion_sensor_motion
      from: 'off'
      to: 'on'
  condition:
    condition: and
    conditions:
      - condition: time
        after: "01:00:00"
        before: "06:00:00"
      - condition: numeric_state
        entity_id: input_number.living_room_light_level
        below: 40 # lx
  action:
    - parallel:
      - service: light.turn_on
        data:
          entity_id: light.ember
          brightness_pct: 20
          transition: 10

- alias: "Turn off living room ambient lights when it's light"
  id: turn_off_living_room_ambient_light_when_light
  trigger:
    - platform: numeric_state
      entity_id: input_number.living_room_light_level
      above: 80
      for:
        minutes: 15
  action:
    service: "light.turn_off"
    data:
      entity_id: light.living_room_ambient_lights
      transition: 30

- alias: "Turn off all living room lights when nobody is there"
  id: turn_off_living_room_light_when_empty
  mode: single
  trigger:
    - platform: state
      entity_id:
        - binary_sensor.living_room_motion_sensor_motion
      to: 'off'
      for:
        minutes: 60
  condition:
    - condition: time
      after: "06:00:00"
      before: "01:00:00"
  action:
    - service: "light.turn_off"
      data:
        entity_id: light.living_room_lights
        transition: 15

- alias: "Turn off all living room lights when nobody is there at night"
  id: turn_off_living_room_light_when_empty
  mode: single
  trigger:
    - platform: state
      entity_id:
        - binary_sensor.living_room_motion_sensor_motion
      to: 'off'
      for:
        minutes: 5
  condition:
    - condition: time
      after: "01:00:00"
      before: "06:00:00"
  action:
    - service: "light.turn_off"
      data:
        entity_id: light.living_room_lights
        transition: 15
