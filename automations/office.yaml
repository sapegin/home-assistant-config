- alias: "Turn on office ambient lights when it's dark and someone enters"
  id: turn_on_office_ambience_when_dark_enter
  mode: single
  triggers:
    - trigger: state
      entity_id: binary_sensor.smart_presence_sensor_occupancy
      from: "off"
      to: "on"
    - platform: numeric_state
      entity_id:
        - input_number.office_light_level
      below: 100
  condition:
    - condition: state
      entity_id: binary_sensor.smart_presence_sensor_occupancy
      state: "on"
    - condition: numeric_state
      entity_id: input_number.office_light_level
      below: 100
    - condition: time
      after: "07:30:00"
      before: "21:59:59"
  action:
    - parallel:
      - service: light.turn_on
        data:
          entity_id: light.mushrump
          brightness_pct: 75
          rgb_color: [255, 197, 98]
          transition: 30
      - service: light.turn_on
        data:
          entity_id: light.sputnik
          brightness_pct: 60
          rgb_color: [255, 136, 29]
          transition: 30
      - service: light.turn_on
        data:
          entity_id:
            - light.twix_1
            - light.twix_2
          brightness_pct: 75
          rgb_color: [255, 155, 35]
          transition: 30

- alias: "Turn on office night light"
  id: turn_on_office_night_light
  mode: single
  trigger:
    - platform: state
      entity_id:
        - binary_sensor.smart_presence_sensor_occupancy
      from: "off"
      to: "on"
  condition:
    - condition: time
      after: "22:00:00"
      before: "07:30:00"
    - condition: state
      entity_id: light.mushrump
      state: "off"
  action:
    - service: light.turn_on
      data:
        entity_id: light.mushrump
        brightness_pct: 20
        rgb_color: [255, 140, 30]
        transition: 15

- alias: "Turn off office ambient lights when it's light"
  id: turn_off_office_ambient_light_when_dark
  mode: single
  trigger:
    - platform: numeric_state
      entity_id:
        - input_number.office_light_level
      above: 105
      for:
        minutes: 15
  action:
    - service: "light.turn_off"
      data:
        entity_id: light.office_ambient_lights
        transition: 180

- alias: "Turn off all office lights when nobody is there"
  id: turn_off_office_light_when_empty
  mode: single
  trigger:
    - platform: state
      entity_id:
        - binary_sensor.smart_presence_sensor_occupancy
      to: "off"
      for:
        minutes: 30
  action:
    - service: "light.turn_off"
      data:
        entity_id: light.office_lights
        transition: 15

- alias: "Turn off office night light"
  id: turn_off_office_night_light
  mode: single
  trigger:
    - platform: state
      entity_id:
        - binary_sensor.smart_presence_sensor_occupancy
      to: "off"
  condition:
    - condition: time
      after: "22:00:00"
      before: "07:30:00"
  action:
    - service: "light.turn_off"
      data:
        entity_id: light.mushrump
        transition: 15
